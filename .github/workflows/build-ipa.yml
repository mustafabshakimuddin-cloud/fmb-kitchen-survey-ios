name: Build Unsigned IPA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Build and Archive
      run: |
        xcodebuild archive \
          -project KitchenSurvey.xcodeproj \
          -scheme KitchenSurvey \
          -configuration Release \
          -archivePath KitchenSurvey.xcarchive \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_ENTITLEMENTS="" \
          CODE_SIGNING_IDENTITY=""

    - name: Create IPA
      run: |
        mkdir Payload
        cp -r KitchenSurvey.xcarchive/Products/Applications/KitchenSurvey.app Payload/
        zip -r KitchenSurvey.ipa Payload

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: KitchenSurvey-Unsigned
        path: KitchenSurvey.ipa
